<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>كرت معايدة</title>

<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">

<style>

body{
text-align:center;
font-family:'Aref Ruqaa',serif;
background:#f5f5f5;
direction:rtl;
}

input{
padding:10px;
font-size:18px;
width:250px;
}

button{
padding:10px 20px;
font-size:18px;
margin:5px;
cursor:pointer;
}

.card{
width:1080px;
height:1920px;
background:url("card.png") no-repeat center;
background-size:cover;
margin:auto;
position:relative;
display:none;
}

.name{
position:absolute;
top:1180px;
width:100%;
font-size:70px;
color:#004aad;
text-align:center;
font-family:'Aref Ruqaa',serif;
}

</style>
</head>

<body>

<h2>مدارس الأكاديمية العصرية</h2>
<p>اكتب اسمك للحصول على كرت المعايدة</p>

<input id="studentName" placeholder="اكتب اسمك هنا">
<br><br>

<button onclick="generateCard()">إنشاء الكرت</button>
<button onclick="downloadCard()">تحميل الكرت</button>

<br><br>

<div class="card" id="card">
<div class="name" id="nameDisplay"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

function generateCard(){

var name=document.getElementById("studentName").value;

if(name===""){
alert("اكتب اسمك");
return;
}

document.getElementById("nameDisplay").innerText=name;
document.getElementById("card").style.display="block";

}

function downloadCard(){

var card=document.getElementById("card");

html2canvas(card).then(function(canvas){

var link=document.createElement("a");
link.download="eid-card.png";
link.href=canvas.toDataURL();
link.click();

});

}

</script>

</body>
</html>
